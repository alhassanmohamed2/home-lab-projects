services:
  # 1. VS Code Server
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    environment:
      - PUID=0
      - PGID=0
      - TZ=Africa/Cairo
      - PASSWORD=Java123@sql
      - SUDO_PASSWORD=Java123@sql
      - DEFAULT_WORKSPACE=/workspace
    volumes:
      - vscode_config:/config
      - vscode_project:/workspace
      - /config/workspace:/config/workspace
    restart: unless-stopped
    ports:
      - "8443:8443"

  # 2. Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "8596:80"   # HTTP Redirect Port
      - "443:443"   # HTTPS Port
    volumes:
      # Config
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # MOUNT THE DUMMY KEYS HERE
      - ./nginx/nginx-selfsigned.crt:/etc/nginx/certs/nginx-selfsigned.crt:ro
      - ./nginx/nginx-selfsigned.key:/etc/nginx/certs/nginx-selfsigned.key:ro
    depends_on:
      - code-server

volumes:
  vscode_config:
  vscode_project: