services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: central_jenkins
    privileged: true
    user: root
    ports:
      - 8081:8080
      - 50000:50000
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - ../:/var/central_root # Mount the whole SystemRoot to Jenkins
    restart: unless-stopped
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    networks:
      - central_net

  monitor_api:
    build:
      context: .
      dockerfile: Dockerfile.monitor
    container_name: central_monitor_api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 8000:8000
    environment:
      - JENKINS_URL=http://jenkins:8080
    networks:
      - central_net

networks:
  central_net:
    driver: bridge
