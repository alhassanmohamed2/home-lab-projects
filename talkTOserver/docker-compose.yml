services:
  pulseaudio:

    image: jess/pulseaudio
    user: root
    privileged: true
    devices:
      - /dev/snd:/dev/snd
    volumes:
      - pulse-socket:/var/run/pulse
      - ./backend/system.pa:/etc/pulse/system.pa
      - /sys:/sys:ro
      - /run/udev:/run/udev:ro
    entrypoint: ["pulseaudio"]
    command: ["--system", "--log-level=debug"]
    restart: unless-stopped

  backend:
    build: ./backend
    depends_on:
      - pulseaudio
    volumes:
      - pulse-socket:/var/run/pulse
    environment:
      - PULSE_SERVER=unix:/var/run/pulse/native
    ports:
      - "8000:8000"

    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  pulse-socket:
