version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    # ports:
    #   - "5678:5678" # Access via Nginx (Port 9574) instead
    environment:
      - N8N_HOST=0.0.0.0 
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://bot.alhassan.life/
      - GENERIC_TIMEZONE=Africa/Cairo
      - N8N_PROXY_HOPS=2
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_CORS_ALLOWED_ORIGINS=*
    extra_hosts:
      - "host.docker.inernal:host-gateway"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - /mnt/data/n8n_data:/home/node/.n8n
      - ./data:/home/node/.n8n-files
    # command: /bin/sh -c "n8n start"

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - /mnt/data/ollama_data:/root/.ollama

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=n8n_custom
      - MYSQL_USER=n8n
      - MYSQL_PASSWORD=n8n
    volumes:
      - /mnt/data/mysql_data:/var/lib/mysql

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - /mnt/data/qdrant_data:/qdrant/storage

  wordpress:
    image: wordpress:latest
    container_name: wordpress
    restart: unless-stopped
    ports:
      - "8090:80"
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: root
      WORDPRESS_DB_PASSWORD: root
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - /mnt/data/wordpress_data:/var/www/html
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - mysql

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - /mnt/data/redis_data:/data
    dns:
      - 8.8.8.8
      - 8.8.4.4

  celery:
    image: python:3.11-slim
    container_name: celery
    restart: unless-stopped
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: /bin/sh -c "pip install celery redis && python3 -m celery -A tasks worker --loglevel=info"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - redis

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "8088:80"
      - "9574:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
    depends_on:
      - n8n

volumes:
  n8n_data:
  ollama_data:
  redis_data:
