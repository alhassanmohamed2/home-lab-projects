version: '3'
services:
  gogs:
    image: gogs/gogs
    container_name: gogs
    ports:
      - "9875:3000"
      - "10022:22"
    volumes:
      - ./gogs-data:/data
    restart: always
    depends_on:
      - db
    links:
      - db
  db:
    image: mysql:8
    container_name: gogs-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: gogs
      MYSQL_USER: gogs
      MYSQL_PASSWORD: gogs_password
    volumes:
      - ./gogs-mysql:/var/lib/mysql
    restart: always
